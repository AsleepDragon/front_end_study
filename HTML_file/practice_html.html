<!-- html版本声明，放在最前-->
<!DOCTYPE html>

<!-- 语言设置 -->
<html lang="zh-CN">
    <head>
        <!-- 编码设置 -->
        <meta charset="UTF-8"/>

        <title>Practice HTML</title>
        
    </head>
    <body>
        <!-- body体里面是将要呈现在网页上的内容-->
        
        <h1>这是一个一级标题</h1>
        <h2>这是一个二级标题</h2>
        <h3>这是一个三级标题</h3>

        <div>

            <!-- div 元素无任何语义，作为容器包含一段内容-->
            <p>这是一段内容</p>
            <p>
                这也是一段内容，br可以换行<br>
                注意p是一个块级元素，一对p元素独占一块区域
            </p>
            <p>span是一个<span>行级元素</span>,在该行中占据自己的位置</p>

        </div>

        <!-- 图片标签 -->
        <img src="/images/girl.png" alt="my girl" width="300">
        <br>
        <img src="/images/car.jpg" alt="my car" width="600">
        <br>
        <img src="https://asleepdragon.github.io/images/girl.png" alt="girl" width="300">
        <br>

        <!-- 超链接 -->
        <!-- 跳转其他网页 -->
        <a href="http://asleepdragon.github.io/" target="_blank">my blog</a>

        <!-- 跳转本地链接 -->
        <a href="/HTML_file/test.html" target="_self">跳转本地链接</a>

        <table border="1" cellspacing="0" width="888" height="333">
            <caption>this a table</caption>
            <thead height="88" align="center" valign="middle">
                <tr align="center" valign="middle">
                    <th>Mon</th>
                    <th>Tue</th>
                    <th>Wed</th>
                    <th>Thu</th>
                    <th>Fri</th>
                    <th>Sat</th>
                    <th>Sun</th>
                </tr>
            </thead>
        
            <tbody height="88" align="center" valign="middle">
                <tr align="center" valign="middle">
                    <td>一</td>
                    <td>二</td>
                    <td>三</td>
                    <td width="300" height="200" align="left" valign="top">四</td>
                    <td rowspan="" colspan="2">五</td>
                    <!-- <td>六</td> -->
                    <td>七</td>
                </tr>
            </tbody>
        
            <tfoot height="88" align="center" valign="middle">
                <tr align="center" valign="middle">
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                    <td>4</td>
                    <td>5</td>
                    <td>6</td>
                    <td>7</td>
                </tr>
            </tfoot>
        </table>

        <!-- <br>换行 -->
        <br>

        <!-- <hr>分割线 -->
        <hr>

        <!-- <pre>按照原文显示 -->
        <pre>
            *       *
           * *     * *
          * * * * * * *
        </pre>

        <!-- 表单容器：所有表单元素必须放在同一个form标签内 -->
        <form>
            <!-- 文本输入框 -->
            <input type="text" name="数据名称" value="默认输入值" maxlength="6">
            <br>

            <!-- 密码输入框 -->
            <input type="password" name="数据名称" value="默认输入值" maxlength="6">
            <br>

            <!-- 单选框 -->
            <input type="radio" name="sex" value="female">女
            <input type="radio" name="sex" value="male">男
            <br>

            <!-- 复选框 -->
            <input type="checkbox" name="hobby" value="smoke">抽烟
            <input type="checkbox" name="hobby" value="drink">喝酒
            <input type="checkbox" name="hobby" value="perm">烫头
            <br>

            <!-- 隐藏域 -->
            <input type="hidden" name="tag" value="100">

            <!-- 提交按钮1 -->
            <input type="submit" value="点我提交">
            <br>
            
            <!-- 提交按钮2 -->
            <button>点我提交</button>
            <br>

            <!-- 重置按钮1 -->
            <input type="reset" value="重置">
            <br>

            <!-- 重置按钮2 -->
            <button type="reset">点我重置</button>
            <br>

            <!-- 文本域 -->
            <textarea name="msg" rows="6" cols="10">文本域</textarea>
            <br>

            <!-- 下拉框 -->
            <select name="from">
                <option value="黑">黑龙江</option>
                <option value="辽">辽宁</option>
                <option value="吉">吉林</option>
                <option value="粤" selected>广东</option>
            </select>

            <fieldset>
                <legend>主要信息</legend>
                <label for="zhanghu">账户：</label>
                <input id="zhanghu" type="text" name="account" maxlength="10"><br>
                <label>
                    密码：
                    <input id="mima" type="password" name="pwd" maxlength="6">
                </label>
                <br>
                性别：
                <input type="radio" name="gender" value="male" id="nan">
                <label for="nan">男</label>
                <label>
                    <input type="radio" name="gender" value="female" id="nv">女
                </label>
            </fieldset>
        </form>


        
        

    </body>
</html>
