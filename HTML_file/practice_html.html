<!-- html版本声明，放在最前-->
<!DOCTYPE html>

<!-- 语言设置 -->
<html lang="zh-CN">
    <head>
        <!-- 编码设置 -->
        <meta charste="UTF-8"/>

        <title>Practice HTML</title>
        
    </head>
    <body>
        <!-- body体里面是将要呈现在网页上的内容-->
        
        <h1>这是一个一级标题</h1>
        <h2>这是一个二级标题</h2>
        <h3>这是一个三级标题</h3>

        <div>

            <!-- div 元素无任何语义，作为容器包含一段内容-->
            <p>这是一段内容</p>
            <p>
                这也是一段内容，br可以换行<br>
                注意p是一个块级元素，一对p元素独占一块区域
            </p>
            <p>span是一个<span>行级元素</span>,在该行中占据自己的位置</p>

        </div>

        <!-- 图片标签 -->
        <img src="/images/girl.png" alt="my girl" width="300">
        <br>
        <img src="/images/car.jpg" alt="my car" width="600">
        <br>
        <img src="https://asleepdragon.github.io/images/girl.png" alt="girl" width="300">
        <br>

        <!-- 超链接 -->
        <!-- 跳转其他网页 -->
        <a href="http://asleepdragon.github.io/" target="_blank">my blog</a>

        <!-- 跳转本地链接 -->
        <a href="/HTML_file/test.html" target="_self">跳转本地链接</a>



    </body>
</html>
